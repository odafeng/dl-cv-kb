<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#6688ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PhD KB">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>博士論文知識庫 — 手術影像分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
:root{--bg:#08080d;--sb:#0e0e16;--card:#13131e;--bd:#1c1c2e;--t:#e6e6f0;--t2:#9898ae;--mt:#606078;--ac:#6688ff;--acs:rgba(102,136,255,.08);--acb:rgba(102,136,255,.25);--tbg:rgba(102,136,255,.1);--ttx:#8aabff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a40;border-radius:3px}
#sb{width:220px;min-width:220px;background:var(--sb);border-right:1px solid var(--bd);padding:14px 10px;overflow-y:auto;flex-shrink:0}
#sb h1{font-size:15px;font-weight:800;padding:0 8px 2px}
#sb .sub{font-size:10px;color:var(--mt);padding:0 8px 14px;letter-spacing:.4px}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:8px 10px;border:none;border-radius:6px;background:0 0;color:var(--t2);font:500 12.5px/1 inherit;cursor:pointer;text-align:left;transition:.15s;margin-bottom:1px}
.nb:hover{background:#181828}.nb.on{background:#1a1a30;color:var(--ac);font-weight:700}
.ns{font-size:9px;color:var(--mt);padding:10px 10px 3px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
#mn{flex:1;overflow-y:auto;padding:28px 36px}
#mn h2{font-size:22px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.pc{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:16px 20px;margin-bottom:12px;transition:border-color .2s}
.pc:hover{border-color:var(--ac)}
.pt{font-size:15px;font-weight:700;margin-bottom:2px}.pm{font-size:11.5px;color:var(--mt);margin-bottom:7px}
.ptg{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.ptg span{font-size:10px;padding:2px 8px;border-radius:14px;background:var(--tbg);color:var(--ttx);font-weight:600}
.pn{font-size:12.5px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.pl{display:flex;flex-wrap:wrap;gap:5px}
.lb{font-size:10.5px;font-weight:600;padding:4px 11px;border-radius:6px;background:var(--acs);color:var(--ac);text-decoration:none;border:1px solid var(--acb);transition:.15s;cursor:pointer;display:inline-block}
.lb:hover{background:var(--ac);color:#fff}
.rb{background:var(--ac)!important;color:#fff!important;border-color:var(--ac)!important}
/* Phase grid */
.phase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:10px}
.phase-card{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.phase-num{width:28px;height:28px;border-radius:6px;background:var(--acs);color:var(--ac);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.phase-name{font-size:13px;font-weight:600;line-height:1.4}
.phase-name-en{font-size:11px;color:var(--t2);margin-top:2px}
/* Prereqs */
.prg{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}
.prc{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px}
.prc h4{font-size:12px;font-weight:700;color:var(--ac);margin-bottom:8px}
.prc li{font-size:11.5px;color:var(--t2);line-height:1.55;margin-bottom:3px;list-style:none;padding-left:10px;position:relative}
.prc li::before{content:"•";position:absolute;left:0;color:var(--mt)}
/* Roadmap */
.rc{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:16px 18px;margin-bottom:12px}
.rc h3{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:9px}
.rn{width:32px;height:32px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.rt{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:12.5px;color:var(--t2);line-height:1.45;cursor:pointer;padding:4px 6px;border-radius:4px;transition:background .15s}
.rt:hover{background:rgba(102,136,255,.05)}
.rt input[type=checkbox]{width:16px;height:16px;margin-top:2px;flex-shrink:0;accent-color:var(--ac);cursor:pointer}
.rt.done span{text-decoration:line-through;opacity:.45}
.ro{font-size:11px;font-weight:700;color:var(--ac);background:var(--acs);display:inline-block;padding:3px 10px;border-radius:5px;margin-top:6px}
/* Chapter detail */
.ch-sec{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;margin-bottom:10px}
.ch-label{font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.ch-body{font-size:13px;color:var(--t2);line-height:1.7}
.ch-item{font-size:12.5px;color:var(--t2);line-height:1.6;padding:2px 0}
/* Mobile topbar */
#mtb{display:none;position:sticky;top:0;z-index:40;background:var(--sb);border-bottom:1px solid var(--bd);padding:10px 14px;align-items:center;justify-content:space-between}
#mtb h1{font-size:14px;font-weight:800}
#mtb button{background:none;border:none;color:var(--t);font-size:22px;cursor:pointer;padding:4px 8px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:45}
#overlay.show{display:block}
/* RWD */
@media(max-width:768px){
  body{flex-direction:column!important;height:auto!important;overflow-y:auto!important;overflow-x:hidden!important}
  #mtb{display:flex!important}
  #sb{position:fixed!important;left:0;top:0;z-index:50;height:100vh!important;transform:translateX(-100%);transition:transform .25s ease;width:75vw!important;max-width:280px;min-width:0!important}
  #sb.open{transform:translateX(0)!important}
  #mn{padding:16px 14px!important;width:100%!important;min-width:0!important}
  #mn h2{font-size:18px}
  .pc{padding:14px 16px}.pt{font-size:14px}.pn{font-size:12px}
  .phase-grid{grid-template-columns:1fr}
  .prg{grid-template-columns:1fr}
  .nb{padding:12px 10px;font-size:13px}
  .lb,.rb{padding:6px 14px;font-size:11px}
}
@media(max-width:400px){
  #mn{padding:12px 10px!important}
  .pc{padding:12px}
  .phase-card{padding:10px}
}
/* PDF modal */
.pdf-modal{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;background:rgba(0,0,0,.85)}
.pdf-modal[hidden]{display:none}
.pdf-modal-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--sb);border-bottom:1px solid var(--bd);flex-shrink:0}
#pdf-modal-title{flex:1;font-size:13px;font-weight:700;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.pdf-modal-bar a,.pdf-modal-bar button{background:var(--card);border:1px solid var(--bd);border-radius:6px;color:var(--t2);padding:5px 12px;font:600 11px inherit;cursor:pointer;text-decoration:none;flex-shrink:0}
.pdf-modal-bar a:hover,.pdf-modal-bar button:hover{border-color:var(--ac);color:var(--ac)}
#pdf-modal-frame{flex:1;border:none;width:100%;background:#fff;min-height:0}
@media(max-width:768px){
  .pdf-modal-bar{padding:6px 10px;gap:6px}
  .pdf-modal-bar a,.pdf-modal-bar button{padding:6px 10px;font-size:11px}
  #pdf-modal-title{font-size:12px}
}
</style>
</head>
<body>
<div id="mtb">
  <h1>📚 博士論文知識庫</h1>
  <div style="display:flex;gap:6px;align-items:center">
    <input id="msearch" type="search" placeholder="搜尋文獻..." oninput="doSearch(this.value)"
           style="font:12px inherit;padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--card);color:var(--t);width:120px">
    <button id="mbtn" onclick="toggleSB()">☰</button>
  </div>
</div>
<div id="overlay" onclick="toggleSB()"></div>
<div id="sb">
  <h1>博士論文知識庫</h1>
  <div class="sub">手術影像分析 · 黃士峯</div>
  <input id="ssearch" type="search" placeholder="🔍 搜尋文獻關鍵字..." oninput="doSearch(this.value)"
         style="display:block;width:100%;font:12px inherit;padding:7px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--card);color:var(--t);margin-bottom:10px">
  <div id="nv"></div>
</div>
<div id="mn"></div>
<div id="pdf-modal" class="pdf-modal" hidden>
  <div class="pdf-modal-bar">
    <span id="pdf-modal-title"></span>
    <a id="pdf-modal-newtab" href="#" target="_blank" rel="noopener" title="在新分頁開啟">↗ 新分頁</a>
    <button onclick="closePDF()" title="關閉 (Esc)">✕</button>
  </div>
  <iframe id="pdf-modal-frame" src="about:blank" title="PDF viewer"></iframe>
</div>
<script type="module" src="src/app.js"></script>
</body>
</html>
