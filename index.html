*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);display:flex;height:100vh;overflow:hidden}

#sb{width:220px;min-width:220px;background:var(--sb);border-right:1px solid var(--bd);padding:14px 10px;overflow-y:auto;flex-shrink:0}

#sb .sub{font-size:10px;color:var(--mt);padding:0 8px 14px;letter-spacing:.4px}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:8px 10px;border:none;border-radius:6px;background:0 0;color:var(--t2);font:500 12.5px/1 inherit;cursor:pointer;text-align:left;transition:.15s;margin-bottom:1px}

.ns{font-size:9px;color:var(--mt);padding:10px 10px 3px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
#mn{flex:1;overflow-y:auto;padding:28px 36px}

.pc{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:16px 20px;margin-bottom:12px;transition:border-color .2s}

.ptg{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.ptg span{font-size:10px;padding:2px 8px;border-radius:14px;background:var(--tbg);color:var(--ttx);font-weight:600}
.pn{font-size:12.5px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.pl{display:flex;flex-wrap:wrap;gap:5px}
.lb{font-size:10.5px;font-weight:600;padding:4px 11px;border-radius:6px;background:var(--acs);color:var(--ac);text-decoration:none;border:1px solid var(--acb);transition:.15s;cursor:pointer}
.lb:hover{background:var(--ac);color:#fff}
.rb{background:var(--ac)!important;color:#fff!important;border-color:var(--ac)!important}

/* Reader */
#rd{display:none;flex:1;flex-direction:column;overflow:hidden}
#rd.show{display:flex}
#rtb{padding:8px 14px;background:var(--sb);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#rtb button,#rtb select{font:600 11px inherit;padding:4px 10px;border-radius:5px;border:1px solid var(--bd);background:var(--card);color:var(--t);cursor:pointer}
#rtb button:hover{border-color:var(--ac);color:var(--ac)}
#rbd{flex:1;display:flex;overflow:hidden}
#pdfbox{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:16px;background:#14141e;display:none}
.pgw{position:relative;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.pgw canvas{display:block}
.tl{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;line-height:1;text-size-adjust:none;-webkit-text-size-adjust:none}
.tl span{color:transparent;position:absolute;white-space:pre;cursor:text;transform-origin:0% 0%}
.tl span[style*="background"]{opacity:1!important}
.tl .hl{border-radius:2px}.tl .hl.yellow{background:var(--hy)}.tl .hl.green{background:var(--hg)}.tl .hl.pink{background:var(--hp)}.tl .hl.blue{background:var(--hb)}

#uz{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:30px}

.da:hover,.da.dg{border-color:var(--ac)}
.da h3{font-size:16px;font-weight:700;margin-bottom:6px}
.da p{font-size:12px;color:var(--t2)}
#hlp{width:260px;min-width:260px;background:var(--sb);border-left:1px solid var(--bd);overflow-y:auto;padding:12px;display:none}
#hlp.show{display:block}

.hi{background:var(--card);border:1px solid var(--bd);border-radius:7px;padding:9px 10px;margin-bottom:7px;font-size:11px}

.hi .hp{color:var(--mt);font-size:10px}.hi .hn{margin-top:4px;font-size:10px;color:var(--t2);font-style:italic}
.hi .ha{display:flex;gap:4px;margin-top:5px}
.hi .ha button{font:500 9px inherit;padding:2px 7px;border-radius:3px;border:1px solid var(--bd);background:0 0;color:var(--mt);cursor:pointer}
.hi .ha button:hover{color:var(--ac);border-color:var(--ac)}
#sp{display:none;position:fixed;z-index:999;background:var(--card);border:1px solid var(--bd);border-radius:7px;padding:4px;box-shadow:0 3px 16px rgba(0,0,0,.5)}
.cb{width:20px;height:20px;border-radius:50%;padding:0;border:2px solid transparent!important;cursor:pointer;margin:2px}
.cb:hover{border-color:#fff!important}

.phase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:10px}
.phase-card{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.phase-num{width:28px;height:28px;border-radius:6px;background:var(--acs);color:var(--ac);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.phase-name{font-size:13px;font-weight:600;line-height:1.4}
.phase-name-en{font-size:11px;color:var(--t2);margin-top:2px}
/* Prereqs */
.prg{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}
.prc{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px}
.prc h4{font-size:12px;font-weight:700;color:var(--ac);margin-bottom:8px}
.prc li{font-size:11.5px;color:var(--t2);line-height:1.55;margin-bottom:3px;list-style:none;padding-left:10px;position:relative}
.prc li::before{content:"•";position:absolute;left:0;color:var(--mt)}
/* Roadmap */
.rc{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:16px 18px;margin-bottom:12px}
.rc h3{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:9px}
.rn{width:32px;height:32px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.rt{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:12.5px;color:var(--t2);line-height:1.45;cursor:pointer;padding:4px 6px;border-radius:4px;transition:background .15s}
.rt:hover{background:rgba(102,136,255,.05)}
.rt input[type=checkbox]{width:16px;height:16px;margin-top:2px;flex-shrink:0;accent-color:var(--ac);cursor:pointer}
.rt.done span{text-decoration:line-through;opacity:.45}
.ro{font-size:11px;font-weight:700;color:var(--ac);background:var(--acs);display:inline-block;padding:3px 10px;border-radius:5px;margin-top:6px}
.loading{text-align:center;padding:40px;color:var(--mt);font-size:13px}
/* Reader text mode */
#reader-text{-webkit-overflow-scrolling:touch}
.rt-page{max-width:640px;margin:0 auto 24px;padding:20px;background:var(--card);border-radius:10px;border:1px solid var(--bd)}
.rt-page-num{font-size:10px;color:var(--mt);text-align:center;margin-bottom:12px;font-weight:600;letter-spacing:1px}
.rt-page p{font-size:15px;line-height:1.85;color:var(--t2);margin-bottom:8px;word-break:break-word}
.rt-page ::selection{background:rgba(255,235,59,.4)}
#float-hl{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:80;background:var(--card);border:1px solid var(--bd);border-radius:24px;padding:6px 10px;box-shadow:0 4px 20px rgba(0,0,0,.5);gap:6px;align-items:center}
#float-hl .cb{width:30px;height:30px}
#float-hl span{font-size:11px;color:var(--mt);margin-right:4px}
.rt-toolbar{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.rt-toolbar button{font:600 11px inherit;padding:5px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--card);color:var(--t2);cursor:pointer}
.rt-toolbar button.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.rt-page-img{margin:0 auto 16px;max-width:640px;text-align:center;background:var(--card);border-radius:10px;border:1px solid var(--bd);padding:8px;overflow:hidden}
/* Mobile topbar */
#mtb{display:none;position:sticky;top:0;z-index:40;background:var(--sb);border-bottom:1px solid var(--bd);padding:10px 14px;align-items:center;justify-content:space-between}

#mtb button{background:none;border:none;color:var(--t);font-size:22px;cursor:pointer;padding:4px 8px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:45}
#overlay.show{display:block}

  #pdfbox{padding:8px}

  #uz{padding:16px}
  .da{padding:30px 20px}.da h3{font-size:14px}
  .nb{padding:12px 10px;font-size:13px}
  .lb,.rb{padding:6px 14px;font-size:11px}
  .cb{width:28px;height:28px}
  #sp{padding:6px}
}
@media(max-width:400px){
  #mn{padding:12px 10px!important}
  .pc{padding:12px}
  .phase-card{padding:10px}
  #rtb{font-size:10px}
}
</style>

// ===== SEARCH =====
function doSearch(q){
  // Sync both search inputs
  if($('ssearch').value!==q)$('ssearch').value=q;
  if($('msearch').value!==q)$('msearch').value=q;
  q=q.trim().toLowerCase();
  if(!q){
    // Restore previous view
    if(view.startsWith('s_'))showS(view.slice(2));else showP(view);
    return;
  }
  const results=P.filter(p=>{
    const hay=[p.t,p.a,p.v,p.n,p.s,...p.tg].join(' ').toLowerCase();
    return q.split(/\s+/).every(w=>hay.includes(w));
  });
  const m=$('mn');
  $('mn').style.display='block';$('rd').classList.remove('show');
  if(!results.length){
    m.innerHTML=`<h2>🔍 搜尋：${q}</h2><div style="color:var(--mt);font-size:13px;padding:20px 0">找不到符合的文獻。試試其他關鍵字？</div>`;
    return;
  }
  m.innerHTML=`<h2>🔍 搜尋：${q}</h2><div style="font-size:12px;color:var(--mt);margin-bottom:14px">找到 ${results.length} 篇文獻</div>${results.map(pcHTML).join('')}`;
}

const isMobile=()=>window.innerWidth<768||('ontouchstart' in window&&window.innerWidth<1024);

async function openR(id){
  curPaper=P.find(p=>p.id===id);if(!curPaper)return;
  $('mn').style.display='none';$('rd').classList.add('show');
  $('rtit').textContent=curPaper.t;
  $('pdfbox').innerHTML='';$('pdfbox').style.display='none';
  $('pdf-iframe').style.display='none';
  pdf=null;pg=1;
  await loadHL(id);

  // Mobile: reader text mode
  if(isMobile()){
    document.querySelectorAll('.desktop-only').forEach(el=>el.style.display='none');
    $('uz').style.display='none';
    $('pdf-iframe').style.display='none';
    $('reader-text').style.display='block';
    $('reader-text').innerHTML='<div class="loading">正在載入閱讀器模式...</div>';
    $('hlp').classList.add('show');
    $('hl-add-mobile').style.display='block';
    renderHLL();
    try{
      const{data}=await sb.storage.from(BUCKET).download(`${id}.pdf`);
      if(data){
        const buf=await data.arrayBuffer();
        await renderReaderMode(buf);
        return;
      }
    }catch(e){}
    // Fallback: show download links
    $('reader-text').innerHTML=`<div style="text-align:center;padding:40px"><p style="color:var(--mt);margin-bottom:14px">PDF 尚未上傳至 Supabase</p>${curPaper.ax?`<a class="lb" href="https://arxiv.org/pdf/${curPaper.ax}.pdf" target="_blank">從 arXiv 下載 PDF↗</a>`:''}</div>`;
    return;
  }

  // Desktop: use pdf.js
  $('hl-add-mobile').style.display='none';
  document.querySelectorAll('.desktop-only').forEach(el=>el.style.display='');
  showUpload('loading');
  try{
    const{data}=await sb.storage.from(BUCKET).download(`${id}.pdf`);
    if(data){await loadPDF(await data.arrayBuffer());return;}
  }catch(e){}
  showUpload('ready');
}

function showUpload(state){
  const uz=$('uz');uz.style.display='flex';
  if(state==='loading'){uz.innerHTML='<div class="loading">正在從 Supabase 載入 PDF...</div>';return;}
  const dl=[];
  if(curPaper.ax)dl.push(`<a class="lb" href="https://arxiv.org/pdf/${curPaper.ax}.pdf" target="_blank">從 arXiv 下載 PDF↗</a>`);
  if(curPaper.doi)dl.push(`<a class="lb" href="https://doi.org/${curPaper.doi}" target="_blank">從 DOI 前往↗</a>`);
  if(curPaper.pmc)dl.push(`<a class="lb" href="https://pmc.ncbi.nlm.nih.gov/articles/${curPaper.pmc}/" target="_blank">從 PMC 前往↗</a>`);
  uz.innerHTML=`<div class="da" id="darea" onclick="$('fi').click()">
    <h3>📄 上傳 PDF 檔案</h3>
    <p>拖曳或點擊選擇｜上傳後自動存入 Supabase</p>
    <input type="file" id="fi" accept=".pdf" style="display:none" onchange="handleF(this.files[0])">
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:14px">${dl.join('')}</div>`;
  const da=$('darea');
  da.addEventListener('dragover',e=>{e.preventDefault();da.classList.add('dg')});
  da.addEventListener('dragleave',()=>da.classList.remove('dg'));
  da.addEventListener('drop',e=>{e.preventDefault();da.classList.remove('dg');if(e.dataTransfer.files[0])handleF(e.dataTransfer.files[0])});
}

async function handleF(file){
  if(!file||file.type!=='application/pdf')return;
  const buf=await file.arrayBuffer();
  // Upload to Supabase
  try{
    await sb.storage.from(BUCKET).upload(`${curPaper.id}.pdf`,file,{upsert:true,contentType:'application/pdf'});
  }catch(e){console.warn('Supabase upload:',e)}
  await loadPDF(buf);
}

async function loadPDF(buf){
  try{
    pdf=await pdfjsLib.getDocument({data:buf}).promise;
    $('uz').style.display='none';$('pdfbox').style.display='flex';
    renderPg(pg);
  }catch(e){alert('PDF 載入失敗：'+e.message)}
}

async function renderPg(n){
  if(!pdf)return;
  const c=$('pdfbox');c.innerHTML='';
  const page=await pdf.getPage(n);
  const vp=page.getViewport({scale:zoom});
  const w=document.createElement('div');w.className='pgw';w.style.width=vp.width+'px';w.style.height=vp.height+'px';
  // Canvas
  const cv=document.createElement('canvas');
  cv.width=vp.width*devicePixelRatio;cv.height=vp.height*devicePixelRatio;
  cv.style.width=vp.width+'px';cv.style.height=vp.height+'px';
  const ctx=cv.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);
  w.appendChild(cv);
  await page.render({canvasContext:ctx,viewport:vp}).promise;
  // Text layer using pdf.js built-in renderTextLayer
  const tc=await page.getTextContent();
  const tl=document.createElement('div');tl.className='tl';
  tl.style.width=vp.width+'px';tl.style.height=vp.height+'px';
  w.appendChild(tl);
  try{
    // Try pdf.js 3.x API
    const tlTask=pdfjsLib.renderTextLayer({textContentSource:tc,container:tl,viewport:vp});
    await tlTask.promise;
  }catch(e1){
    try{
      // Fallback: older API
      const tlTask=pdfjsLib.renderTextLayer({textContent:tc,container:tl,viewport:vp});
      await tlTask.promise;
    }catch(e2){
      // Manual fallback
      console.warn('renderTextLayer failed, using manual placement',e2);
      tc.items.forEach(it=>{
        if(!it.str.trim())return;
        const sp=document.createElement('span');
        const tx=pdfjsLib.Util.transform(vp.transform,it.transform);
        sp.textContent=it.str;
        sp.style.position='absolute';
        sp.style.left=tx[4]+'px';
        sp.style.top=(vp.height-tx[5])+'px';
        sp.style.fontSize=Math.abs(tx[0])+'px';
        sp.style.color='transparent';
        sp.style.whiteSpace='pre';
        if(it.width)sp.style.width=(it.width*vp.scale)+'px';
        tl.appendChild(sp);
      });
    }
  }
  console.log('Text layer spans:',tl.querySelectorAll('span').length);
  c.appendChild(w);
  $('pgi').textContent=`${n} / ${pdf.numPages}`;
  applyHL(n,tl);
  w.addEventListener('mouseup',handleSel);
}

function prevP(){if(pdf&&pg>1){pg--;renderPg(pg)}}
function nextP(){if(pdf&&pg<pdf.numPages){pg++;renderPg(pg)}}
function chgZ(v){zoom=parseFloat(v);if(pdf)renderPg(pg)}
function closeR(){$('rd').classList.remove('show');$('mn').style.display='block';pdf=null;$('pdf-iframe').src='';$('pdf-iframe').style.display='none';$('reader-text').style.display='none';$('hlp').classList.remove('show');$('float-hl').style.display='none'}

// ===== READER TEXT MODE (mobile) =====
let readerDoc=null;
async function renderReaderMode(buf){
  readerDoc=await pdfjsLib.getDocument({data:buf}).promise;
  const rt=$('reader-text');
  rt.innerHTML=`<div class="rt-toolbar">
    <button class="active" data-mode="text" onclick="switchReaderMode('text',this)">📝 文字模式</button>
    <button data-mode="page" onclick="switchReaderMode('page',this)">📄 頁面模式</button>
  </div><div id="rt-content"></div>`;
  await renderTextMode();
}

async function switchReaderMode(mode,btn){
  document.querySelectorAll('.rt-toolbar button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(mode==='text')await renderTextMode();
  else await renderPageMode();
}

async function renderTextMode(){
  const doc=readerDoc;if(!doc)return;
  const cont=$('rt-content');
  cont.innerHTML='<div class="loading">擷取文字中...</div>';
  let html='';
  for(let i=1;i<=doc.numPages;i++){
    const page=await doc.getPage(i);
    const tc=await page.getTextContent();
    const lines=[];let curLine=[];let lastY=null;
    tc.items.forEach(item=>{
      if(!item.str.trim())return;
      const y=Math.round(item.transform[5]);
      if(lastY!==null&&Math.abs(y-lastY)>3){
        if(curLine.length)lines.push(curLine.join(' '));
        curLine=[];
      }
      curLine.push(item.str);lastY=y;
    });
    if(curLine.length)lines.push(curLine.join(' '));
    const paragraphs=[];let curPara=[];
    lines.forEach(line=>{
      const t=line.trim();
      if(!t){if(curPara.length)paragraphs.push(curPara.join(' '));curPara=[];}
      else curPara.push(t);
    });
    if(curPara.length)paragraphs.push(curPara.join(' '));
    html+=`<div class="rt-page" data-page="${i}"><div class="rt-page-num">— 第 ${i} / ${doc.numPages} 頁 —</div>${paragraphs.map(p=>`<p>${escHTML(p)}</p>`).join('')}</div>`;
  }
  cont.innerHTML=html;
  applyReaderHL();
  cont.addEventListener('mouseup',checkReaderSel);
  cont.addEventListener('touchend',()=>setTimeout(checkReaderSel,200));
}

async function renderPageMode(){
  const doc=readerDoc;if(!doc)return;
  const cont=$('rt-content');
  // Create placeholder divs, lazy render with IntersectionObserver
  const screenW=Math.min(window.innerWidth-24,640);
  let html='';
  for(let i=1;i<=doc.numPages;i++){
    html+=`<div class="rt-page-img" data-page="${i}" style="min-height:${screenW*1.4}px;display:flex;align-items:center;justify-content:center"><div class="loading" style="padding:20px">第 ${i} 頁載入中...</div></div>`;
  }
  cont.innerHTML=html;
  // Lazy render
  const observer=new IntersectionObserver(async(entries)=>{
    for(const entry of entries){
      if(!entry.isIntersecting)continue;
      const div=entry.target;
      if(div.dataset.rendered)continue;
      div.dataset.rendered='1';
      const pageNum=parseInt(div.dataset.page);
      try{
        const page=await doc.getPage(pageNum);
        const scale=screenW/page.getViewport({scale:1}).width;
        const vp=page.getViewport({scale});
        const cv=document.createElement('canvas');
        cv.width=vp.width*2;cv.height=vp.height*2;
        cv.style.width='100%';cv.style.borderRadius='6px';
        const ctx=cv.getContext('2d');ctx.scale(2,2);
        await page.render({canvasContext:ctx,viewport:vp}).promise;
        div.innerHTML='';
        div.style.minHeight='auto';
        div.appendChild(cv);
        // Page number label
        const lbl=document.createElement('div');
        lbl.className='rt-page-num';lbl.style.marginTop='6px';
        lbl.textContent=`第 ${pageNum} / ${doc.numPages} 頁`;
        div.appendChild(lbl);
      }catch(e){div.innerHTML=`<div class="loading">第 ${pageNum} 頁載入失敗</div>`}
    }
  },{rootMargin:'200px'});
  cont.querySelectorAll('.rt-page-img').forEach(el=>observer.observe(el));
}

function escHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function checkReaderSel(){
  const sel=window.getSelection();
  const text=sel.toString().trim();
  const fh=$('float-hl');
  if(text.length>2){
    fh.style.display='flex';
  }else{
    fh.style.display='none';
  }
}

async function addHLFromSel(color){
  const sel=window.getSelection();
  const text=sel.toString().trim();
  if(!text||!curPaper)return;
  const id=curPaper.id;
  if(!hls[id])hls[id]=[];
  // Try to determine page number
  let pageNum=0;
  const anchor=sel.anchorNode;
  if(anchor){
    const pageEl=anchor.parentElement?.closest('.rt-page');
    if(pageEl)pageNum=parseInt(pageEl.dataset.page)||0;
  }
  hls[id].push({text,page:pageNum,color,note:'',ts:Date.now()});
  await saveHL(id);renderHLL();
  // Highlight in reader view
  applyReaderHL();
  sel.removeAllRanges();
  $('float-hl').style.display='none';
}

function applyReaderHL(){
  if(!curPaper||!hls[curPaper.id])return;
  const rt=$('reader-text');
  const pages=rt.querySelectorAll('.rt-page');
  pages.forEach(pageEl=>{
    const pageNum=parseInt(pageEl.dataset.page)||0;
    const pageHls=hls[curPaper.id].filter(h=>h.page===pageNum||h.page===0);
    if(!pageHls.length)return;
    pageEl.querySelectorAll('p').forEach(p=>{
      let html=p.innerHTML;
      pageHls.forEach(h=>{
        const bg=HL_COLORS[h.color]||HL_COLORS.yellow;
        const escaped=escHTML(h.text).replace(/\s+/g,'\\s+');
        try{
          const re=new RegExp(`(${escaped.replace(/[.*+?^${}()|[\]\\]/g,'\\$&').replace(/\\\\s\\\+/g,'\\s+')})`,'gi');
          html=html.replace(re,`<mark style="background:${bg};border-radius:2px;color:inherit;padding:1px 0">$1</mark>`);
        }catch(e){}
      });
      p.innerHTML=html;
    });
  });
}
function toggleHL(){$('hlp').classList.toggle('show')}

// Mobile manual highlight
async function addHLManual(color){
  const input=$('hl-input');
  const text=input.value.trim();
  if(!text||!curPaper)return;
  const id=curPaper.id;
  if(!hls[id])hls[id]=[];

// ===== HIGHLIGHTING =====
function handleSel(e){
  const s=window.getSelection();const t=s.toString().trim();
  if(t.length>0){
    selInfo={text:t,page:pg};
    const sp=$('sp');sp.style.display='flex';sp.style.left=(e.clientX-50)+'px';sp.style.top=(e.clientY-40)+'px';
  }else{$('sp').style.display='none';selInfo=null}
}
document.addEventListener('mousedown',e=>{if(!e.target.closest('#sp'))$('sp').style.display='none'});

async function addHL(color){
  if(!selInfo||!curPaper)return;
  const id=curPaper.id;
  if(!hls[id])hls[id]=[];
  hls[id].push({text:selInfo.text,page:selInfo.page,color,note:'',ts:Date.now()});
  await saveHL(id);renderHLL();
  $('sp').style.display='none';window.getSelection().removeAllRanges();
  // Re-render only if needed, preserving scroll position
  const box=$('pdfbox');
  const scrollY=box.scrollTop;
  await renderPg(pg);
  box.scrollTop=scrollY;
}

const HL_COLORS={yellow:'rgba(255,235,59,0.35)',green:'rgba(76,175,80,0.35)',pink:'rgba(233,30,99,0.3)',blue:'rgba(33,150,243,0.3)'};

function applyHL(pageN,tl){
  if(!curPaper||!hls[curPaper.id])return;
  const phl=hls[curPaper.id].filter(h=>h.page===pageN);
  if(!phl.length)return;
  const spans=Array.from(tl.querySelectorAll('span'));
  if(!spans.length)return;

  // Build char offset map: for each span, its start offset in fullText
  let fullText='';
  const spanOffsets=[]; // {start, end, span}
  spans.forEach((sp,si)=>{
    const t=sp.textContent;
    spanOffsets.push({start:fullText.length, end:fullText.length+t.length, si});
    fullText+=t;
  });

  phl.forEach(h=>{
    const needle=h.text.replace(/\s+/g,' ').trim();
    let idx=fullText.indexOf(needle);
    if(idx===-1){
      const normFull=fullText.replace(/\s+/g,' ');
      idx=normFull.indexOf(needle);
    }
    if(idx===-1)return;
    const hlStart=idx, hlEnd=idx+needle.length;
    const bg=HL_COLORS[h.color]||HL_COLORS.yellow;

    // Find overlapping spans and split precisely
    spanOffsets.forEach(({start,end,si})=>{
      const sp=spans[si];
      if(hlEnd<=start||hlStart>=end)return; // no overlap
      const oStart=Math.max(hlStart,start)-start; // offset within span
      const oEnd=Math.min(hlEnd,end)-start;
      const text=sp.textContent;

      if(oStart===0&&oEnd===text.length){
        // Entire span highlighted
        sp.style.backgroundColor=bg;
        sp.style.borderRadius='2px';
        sp.style.opacity='1';
      }else{
        // Partial: split into text nodes + highlighted span
        const before=text.substring(0,oStart);
        const mid=text.substring(oStart,oEnd);
        const after=text.substring(oEnd);
        sp.textContent='';
        if(before)sp.appendChild(document.createTextNode(before));
        const mark=document.createElement('span');
        mark.textContent=mid;
        mark.style.backgroundColor=bg;
        mark.style.borderRadius='2px';
        mark.style.color='transparent';
        sp.appendChild(mark);
        if(after)sp.appendChild(document.createTextNode(after));
        sp.style.opacity='1';
      }
    });
  });
}

function renderHLL(){
  const l=$('hll');
  if(!curPaper||!hls[curPaper.id]||!hls[curPaper.id].length){
    l.innerHTML='<div style="font-size:11px;color:var(--mt);text-align:center;padding:16px">尚無標記<br>選取 PDF 文字即可新增</div>';return;
  }
  const h=hls[curPaper.id].slice().reverse();
  l.innerHTML=h.map((hl,ri)=>{
    const i=h.length-1-ri;
    const bc=hl.color==='yellow'?'#fdd835':hl.color==='green'?'#4caf50':hl.color==='pink'?'#e91e63':'#2196f3';
    return `<div class="hi"><div class="ht" style="border-color:${bc}">"${hl.text.slice(0,100)}${hl.text.length>100?'...':''}"</div>
    <div class="hp">${hl.page>0?`第 ${hl.page} 頁`:'手動標記'}</div>
    ${hl.note?`<div class="hn">📝 ${hl.note}</div>`:''}
    <div class="ha"><button onclick="noteHL(${i})">筆記</button><button onclick="goPg(${hl.page})">跳轉</button><button onclick="delHL(${i})">刪除</button></div></div>`;
  }).join('');
}

async function noteHL(i){const n=prompt('輸入筆記：',hls[curPaper.id][i].note||'');if(n!==null){hls[curPaper.id][i].note=n;await saveHL(curPaper.id);renderHLL()}}
function goPg(p){pg=p;renderPg(pg)}
async function delHL(i){hls[curPaper.id].splice(i,1);await saveHL(curPaper.id);renderHLL();if(pdf){const s=$('pdfbox').scrollTop;await renderPg(pg);$('pdfbox').scrollTop=s}}

// ===== STORAGE (Supabase) =====
async function saveHL(paperId){
  try{
    const data=JSON.stringify(hls[paperId]);
    const blob=new Blob([data],{type:'application/json'});
    await sb.storage.from(BUCKET).upload(`highlights/${paperId}.json`,blob,{upsert:true,contentType:'application/json'});
  }catch(e){console.warn('Save HL:',e)}
}
async function loadHL(paperId){
  try{
    const{data}=await sb.storage.from(BUCKET).download(`highlights/${paperId}.json`);
    if(data){hls[paperId]=JSON.parse(await data.text())}else{hls[paperId]=[]}
  }catch(e){hls[paperId]=[]}
  renderHLL();
}

// ===== CHECKBOXES =====
let ckState={};
async function loadCkState(){
  try{
    const{data}=await sb.storage.from(BUCKET).download('checkboxes.json');
    if(data)ckState=JSON.parse(await data.text());
  }catch(e){ckState={}}
}
async function saveCkState(){
  try{
    const blob=new Blob([JSON.stringify(ckState)],{type:'application/json'});
    await sb.storage.from(BUCKET).upload('checkboxes.json',blob,{upsert:true,contentType:'application/json'});
  }catch(e){console.warn('Save ck:',e)}
}
function toggleCk(el){
  const key=el.dataset.ck;
  ckState[key]=el.checked;
  el.closest('.rt').classList.toggle('done',el.checked);
  saveCkState();
}
// Click anywhere on .rt row to toggle checkbox
document.addEventListener('click',e=>{
  const rt=e.target.closest('.rt');
  if(!rt)return;
  if(e.target.tagName==='INPUT')return; // checkbox handles itself
  const cb=rt.querySelector('input[type=checkbox]');
  if(cb){cb.checked=!cb.checked;toggleCk(cb)}
});
function applyCkState(){
  document.querySelectorAll('.rt input[type=checkbox]').forEach(el=>{
    const key=el.dataset.ck;
    if(ckState[key]){
      el.checked=true;
      el.closest('.rt').classList.add('done');
    }
  });
}
loadCkState();

  if(e.key==='ArrowLeft')prevP();
